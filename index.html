    <title>Bokle AI — Internal CRM</title>
    <link rel="icon" href="/mascot.png">
    <script>
      // Suppress Tailwind CDN warning for clean console in production/Vercel
      const originalWarn = console.warn;
      console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) return;
        originalWarn.apply(console, args);
      };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bokle: {
                black:   '#010801',
                green:   '#15621B',
                mid:     '#239A2C',
                pure:    '#00C60F',
                rainbow: '#49CA68',
                erin:    '#00FF3D',
                white:   '#FFFFFF',
              }
            },
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'DM Sans', sans-serif;
        background-color: #f3f4f6;
      }
    </style>
